<body>
    <script>
    var a=1>2;
    var b="a">"b"; //ascii 码 比较
    var c="10">"8"; //字符串 比较第一位 
    var d= NaN==NaN; // 特例
    document.write(a+" "+b+" "+c+" "+d+"<br/>");
    </script>
    <script>
    //逻辑运算符 &&  ||  !
    // && 第几表达式为假时返回该表达式,则返回最后表达式值。
    //&&短路语句，一般开发用了判断后端传的值如 data && fn(data); 当data有意义可执行。
    // undefined, null ,NaN, "",0,flase ==>返回Boolean值都为false;
    var a = 1&& 2+2;// 第一表达式为真 返回第二表达式值 2+2;
    var b = null && 2+2; // 第一表达式为假 返回第一表达式值 0;
    document.write(a+" "+b);
    // || 与运算符 ，碰到真就返回
    </script>
    <script>
    for(var i=0;i<1000;i++){
        if(i%3==0&i%5==0&i%7==0){
            document.write(i+" ");
        } 
    }
    document.write("<br/>")
    // while循环
    var i=0
    while(i<10){
        document.write(i);
        i++;
    }
    </script>

    求一百以内的质数<br>
    <script>
    var sum=0;
    for(var i=2;i<100;i++){
        for(var k=1;k<=Math.sqrt(i);k++){//Math.sqrt 求根
            if(i%k==0){
                sum++;
            }
        }
        if(sum==1){
            document.write(i+" ");
        }
        sum=0;
    }
    </script>
