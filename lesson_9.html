    <!-- 
        深度克隆
     -->
    <script>
        var obj={
            name:"abc",
            age:123,
            card:['visa','master'],
            wife:{
                name:"aaa",
                son:{
                    name:"bbb"
                }
            }
        }
        //  遍历对象  for(var prop in obj)
        //  1.判断是不是原始值     typeof()  
        //  2.判断是数组还是对象  instanceof toString constructor
        //  3.建立相应的数组或对象
        //  递归
        var obj1={};
        function deepClone(origin,target){
            var target=target || {},
                obStr=Object.prototype.toString,
                arr="[object Array]";
            for(var prop in origin){
                if(origin.hasOwnProperty(prop)){  //判断是否为原型__proto__上的值
                if(origin[prop]!=="null"&&typeof(origin[prop])=="object"){
                    // if(obStr.call(origin[prop])==arr){
                    //     target[prop]=[];
                    // }else{
                    //     target[prop]={};
                    // }
                    //三目运算符 简化
                    target[prop]=obStr.call(origin[prop])==arr?[]:{};
                    deepClone(origin[prop],target[prop]);
                } else{
                target[prop]=origin[prop];
                     }
             }
         }
               return target;
        }
    </script>
